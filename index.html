<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Polla Mundialera · Colomas y Asociados</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#F0EBD8;font-family:system-ui,-apple-system,sans-serif;color:#0D1A12;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}

/* ── HEADER ── */
header{background:repeating-linear-gradient(90deg,#0B3D2E 0 34px,#165C40 34px 68px);border-bottom:4px solid #D9A93B;padding:14px 16px 12px}
.kicker{font-size:10px;letter-spacing:.22em;color:#F0CE73;font-weight:700;text-transform:uppercase;margin-bottom:4px}
h1{font-weight:800;font-size:clamp(20px,5vw,28px);color:#fff;line-height:1}
.header-meta{display:flex;align-items:center;gap:12px;margin-top:8px;flex-wrap:wrap}
.pill{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:4px 10px;font-size:11px;color:#cfe6da}
.dot{width:7px;height:7px;border-radius:50%;background:#D9A93B;animation:pulse 2s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(217,169,59,.6)}70%{box-shadow:0 0 0 6px rgba(217,169,59,0)}100%{box-shadow:0 0 0 0 rgba(217,169,59,0)}}
.scorer-pill{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:4px 10px;font-size:11px;color:#F0CE73;display:inline-flex;align-items:center;gap:5px}

/* ── TABS ── */
nav{position:sticky;top:0;z-index:20;background:#F0EBD8;border-bottom:1px solid #E0D8C8}
.tabs{max-width:900px;margin:0 auto;display:flex;overflow-x:auto;padding:0 8px}
.tab{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#6E7B70;background:none;border:none;cursor:pointer;padding:13px 12px 11px;border-bottom:3px solid transparent;white-space:nowrap}
.tab.on{color:#0B3D2E;border-bottom-color:#D9A93B}

/* ── WRAP ── */
.wrap{max-width:900px;margin:0 auto;padding:14px 12px 56px}
.panel{display:none}.panel.on{display:block}
.sec{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#6E7B70;margin:20px 2px 10px;display:flex;align-items:center;gap:8px}
.sec::after{content:"";flex:1;height:1px;background:#D8D0BC}

/* ── YOU CARD ── */
.youcard{background:linear-gradient(135deg,#0B3D2E,#1c5a3a);color:#fff;border-radius:16px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 8px 24px -12px rgba(11,61,46,.4);margin-bottom:16px;border:1px solid rgba(255,255,255,.08)}
.youcard .lbl{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#F0CE73;font-weight:700}
.youcard .pos{font-weight:800;font-size:44px;line-height:.9}
.youcard .nm{font-size:13px;color:#bdd9ca;margin-top:3px}
.youcard .gap{font-size:11px;color:#9fc4b3;margin-top:5px}
.youcard .pts{font-weight:800;font-size:32px;text-align:right}
.youcard .ptl{font-size:10px;color:#9fc4b3;text-align:right;letter-spacing:.1em;text-transform:uppercase}

/* ── RANKING TABLE ── */
.board{background:#fff;border:1px solid #E0D8C8;border-radius:14px;overflow:hidden;box-shadow:0 4px 14px -6px rgba(11,61,46,.15)}
.brow{display:grid;grid-template-columns:40px 1fr auto;gap:8px;align-items:center;padding:10px 14px;border-bottom:1px solid #F0EBD8}
.brow:last-child{border-bottom:none}
.brow.hd{background:#EDE8DB;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:#6E7B70;padding:8px 14px}
.brow.you{background:linear-gradient(90deg,rgba(14,140,90,.1),transparent);box-shadow:inset 3px 0 0 #0E8C5A}
.medal{font-size:18px;text-align:center}
.rkn{font-weight:700;font-size:16px;color:#9AA89C;text-align:center}
.pname{font-weight:600;font-size:14px;display:flex;align-items:center;gap:6px}
.you-tag{font-size:8px;font-weight:700;background:#0E8C5A;color:#fff;border-radius:3px;padding:1px 4px}
.pmeta{font-size:11px;color:#6E7B70;margin-top:1px}
.ptot{font-weight:800;font-size:20px;text-align:right}

/* ── MATCHES ── */
.match-card{background:#fff;border:1px solid #E0D8C8;border-radius:12px;padding:10px 12px;margin-bottom:8px;box-shadow:0 1px 4px -2px rgba(0,0,0,.06)}
.match-head{display:flex;align-items:center;gap:10px;margin-bottom:0}
.mnum{font-weight:700;font-size:10px;color:#9AA89C;min-width:28px}
.mteams{flex:1;display:flex;align-items:center;gap:8px;font-weight:600;font-size:13px}
.mteams .t{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.mteams .t.r{text-align:right}
.mres{font-weight:800;font-size:15px;background:#0B3D2E;color:#fff;border-radius:7px;padding:3px 10px;white-space:nowrap}
.mres.upcoming{background:#E8E2D0;color:#6E7B70}
.mdate{font-size:10px;color:#9AA89C;margin-top:4px;margin-left:38px}
.preds-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:8px;margin-left:38px}
.pred{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 5px;border-radius:5px;background:#F8F4EC}
.pred.p3{background:#D4EDDA;font-weight:700}
.pred.p1{background:#FFF3CD}
.pred.p0{background:#F8F4EC;opacity:.65}
.pred .pn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#0D1A12}
.pred .pp{font-weight:700;font-size:10px;color:#0B3D2E;white-space:nowrap}
.pred .sc{font-size:10px;color:#6E7B70;white-space:nowrap}
.badge{font-size:9px;font-weight:700;padding:1px 4px;border-radius:3px}
.b3{background:#1a7a3a;color:#fff}
.b1{background:#8a6a00;color:#fff}
.b0{background:#bbb;color:#fff}
.expand-btn{font-size:11px;color:#0B3D2E;font-weight:600;cursor:pointer;margin:4px 0 0 38px;display:inline-block;background:none;border:none;padding:0}
.preds-full{display:none}
.preds-full.open{display:block}

/* ── EVOLUTION CHART ── */
.chartbox{background:#fff;border:1.5px solid #D8D0BC;border-radius:14px;padding:10px 4px 4px;box-shadow:0 6px 20px -10px rgba(11,61,46,.2);overflow-x:auto;margin-bottom:12px}
svg.echart{display:block;width:100%;height:auto}
.ectl{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.seg{display:inline-flex;background:#fff;border:1.5px solid #C8C0A8;border-radius:8px;overflow:hidden}
.seg button{font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.06em;border:none;padding:7px 12px;cursor:pointer;background:transparent;color:#6E7B70}
.seg button.on{background:#0B3D2E;color:#fff}
.clr-btn{font-weight:700;font-size:11px;text-transform:uppercase;border:1.5px solid #C8C0A8;background:#fff;color:#6E7B70;border-radius:8px;padding:7px 11px;cursor:pointer;display:none}
#evo-info{font-size:12px;color:#4A5A4E;flex:1}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 6px}
@media(min-width:500px){.leg-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:700px){.leg-grid{grid-template-columns:repeat(4,1fr)}}
.chip{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:7px;cursor:pointer;background:#fff;transition:opacity .15s,box-shadow .12s}
.chip .cn{font-size:12.5px;font-weight:600;color:#0D1A12;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chip .cy{font-size:8px;font-weight:700;background:#0E8C5A;color:#fff;border-radius:3px;padding:1px 4px;flex-shrink:0}
.chip .crk{font-weight:700;font-size:11px;color:#5A6A5E;min-width:22px;text-align:right}

/* ── SPECIALS ── */
.spec-table{width:100%;border-collapse:collapse;background:#fff;border:1px solid #E0D8C8;border-radius:12px;overflow:hidden;font-size:12px}
.spec-table th{background:#EDE8DB;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#6E7B70;padding:8px 8px;text-align:left}
.spec-table td{padding:7px 8px;border-top:1px solid #F0EBD8;color:#0D1A12}
.spec-table tr.you-row td{background:rgba(14,140,90,.07)}
.foot{text-align:center;font-size:11px;color:#9A9080;margin-top:24px}

/* ── LOADING ── */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:12px}
.spinner{width:36px;height:36px;border:3px solid #D8D0BC;border-top-color:#0B3D2E;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

    <button class="tab" data-tab="esp">Especiales</button>

</nav>

<div class="wrap">

    <div class="panel" id="panel-evo"></div>
    <div class="panel" id="panel-esp"></div>
  </div>
</div>

// ── RANKING ───────────────────────────────────────────────────────────
function buildRanking(data){
  const me = data.ranking.find(r=>r.name===YOU);
  const leader = data.ranking[0];
  const gap = leader.pts - me.pts;
  let html = `<div class="youcard">
    <div>
      <div class="lbl">Tu posición</div>
      <div class="pos">#${me.rank}</div>
      <div class="nm">Pablo</div>
      <div class="gap">${gap===0?'¡Lideras la polla!':'A '+gap+' pt'+(gap>1?'s':'')+' del líder ('+dn(leader.name)+')'}</div>
    </div>
    <div><div class="pts">${me.pts}</div><div class="ptl">puntos</div></div>
  </div>
  <div class="sec">Tabla general</div>
  <div class="board">
    <div class="brow hd"><div style="text-align:center">#</div><div>Jugador</div><div style="text-align:right">Pts</div></div>`;
  data.ranking.forEach(r=>{
    const you = r.name===YOU;
    html += `<div class="brow${you?' you':''}">
      <div>${medal(r.rank)?`<div class="medal">${medal(r.rank)}</div>`:`<div class="rkn">${r.rank}</div>`}</div>
      <div>
        <div class="pname">${dn(r.name)}${you?'<span class="you-tag">TÚ</span>':''}</div>
        <div class="pmeta">${r.exact} exactos · ${r.outc} resultados</div>
      </div>
      <div class="ptot">${r.pts}</div>
    </div>`;
  });
  html += `</div>`;
  document.getElementById('panel-rank').innerHTML = html;
}

// ── PREDICCIONES DEL DÍA ─────────────────────────────────────────────
function buildHoy(data){
  let html = '';

  // UPCOMING
  if(data.upcoming && data.upcoming.length){
    html += `<div class="sec">Próxima fecha — ${data.upcoming[0].fecha}</div>`;
    data.upcoming.forEach(m=>{
      html += `<div class="match-card">
        <div class="match-head">
          <div class="mnum">M${m.num}</div>
          <div class="mteams">
            <span class="t r">${flag(m.team1)} ${m.team1}</span>
            <span class="mres upcoming">vs</span>
            <span class="t">${m.team2} ${flag(m.team2)}</span>
          </div>
        </div>
        <div class="mdate">Grupo ${m.grupo} · ${m.fecha}</div>
        <div class="preds-grid">`;
      m.preds.forEach(p=>{
        html += `<div class="pred"><span class="pn">${dn(p.name)}</span><span class="sc">${p.h}–${p.a}</span></div>`;
      });
      html += `</div></div>`;
    });
  }

  // RECENT RESULTS
  if(data.recentMatches && data.recentMatches.length){
    const dates = [...new Set(data.recentMatches.map(m=>m.fecha))].sort((a,b)=>parseInt(b)-parseInt(a));
    dates.forEach(fecha=>{
      html += `<div class="sec">Resultados — ${fecha}</div>`;
      data.recentMatches.filter(m=>m.fecha===fecha).forEach(m=>{
        const show3 = m.preds.filter(p=>p.pts===3);
        const show1 = m.preds.filter(p=>p.pts===1);
        const show0 = m.preds.filter(p=>p.pts===0);
        html += `<div class="match-card">
          <div class="match-head">
            <div class="mnum">M${m.num}</div>
            <div class="mteams">
              <span class="t r">${flag(m.team1)} ${m.team1}</span>
              <span class="mres">${m.resH}–${m.resA}</span>
              <span class="t">${m.team2} ${flag(m.team2)}</span>
            </div>
          </div>
          <div class="mdate">Grupo ${m.grupo}</div>
          <div class="preds-grid">`;
        m.preds.slice(0,6).forEach(p=>{
          const cls = p.pts===3?'p3':p.pts===1?'p1':'p0';
          const badge = p.pts===3?'<span class="badge b3">3</span>':p.pts===1?'<span class="badge b1">1</span>':'<span class="badge b0">0</span>';
          html += `<div class="pred ${cls}">${badge}<span class="pn">${dn(p.name)}</span><span class="sc">${p.h}–${p.a}</span></div>`;
        });
        html += `</div>`;
        if(m.preds.length>6){
          const id='pp'+m.num;
          html += `<button class="expand-btn" onclick="togglePreds('${id}')">Ver todos (${m.preds.length}) ▾</button>
          <div class="preds-full" id="${id}"><div class="preds-grid" style="margin-left:0;margin-top:6px">`;
          m.preds.slice(6).forEach(p=>{
            const cls = p.pts===3?'p3':p.pts===1?'p1':'p0';
            const badge = p.pts===3?'<span class="badge b3">3</span>':p.pts===1?'<span class="badge b1">1</span>':'<span class="badge b0">0</span>';
            html += `<div class="pred ${cls}">${badge}<span class="pn">${dn(p.name)}</span><span class="sc">${p.h}–${p.a}</span></div>`;
          });
          html += `</div></div>`;
        }
        html += `</div>`;
      });
    });
  }
  document.getElementById('panel-hoy').innerHTML = html ||
    '<div style="text-align:center;padding:40px;color:#6E7B70;font-size:13px">No hay partidos recientes cargados.</div>';
}
function togglePreds(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  const btn=el.previousElementSibling;
  btn.textContent=el.classList.contains('open')?'Ocultar ▴':'Ver todos ▾';
}

// ── EVOLUCIÓN ─────────────────────────────────────────────────────────
function buildEvo(data){
  const ev = data.evolution;
  const PLAYERS = ev.players;
  const DATES = ev.dates;
  const D = DATES.length, N = PLAYERS.length;
  const COLORS = {};
  PLAYERS.forEach((p,i)=>COLORS[p.name]=p.name===YOU?"#0E8C5A":PAL[i%PAL.length]);

  const W=820,H=380,ML=26,MR=18,MT=14,MB=34,IW=W-ML-MR,IH=H-MT-MB;
  const xi=i=>ML+(D<2?IW/2:i*IW/(D-1));
  const yR=r=>MT+(r-1)/(N-1)*IH;
  const yP=(v,mx)=>MT+IH-(v/mx)*IH;
  const maxPts=Math.max(...PLAYERS.flatMap(p=>p.pts));

  let evoMode='pos', sel=new Set();

  function yOf(p,i){return evoMode==='pos'?yR(p.ranks[i]):yP(p.pts[i],maxPts);}
  function mkPath(p){return p.ranks.map((_,i)=>(i===0?'M':'L')+xi(i).toFixed(1)+','+yOf(p,i).toFixed(1)).join(' ');}
  function deCol(arr){arr.sort((a,b)=>a.y-b.y);for(let k=1;k<arr.length;k++)if(arr[k].y<arr[k-1].y+13)arr[k].y=arr[k-1].y+13;return arr;}

  function svgEl(tag,attrs,txt){
    const el=document.createElementNS('http://www.w3.org/2000/svg',tag);
    for(const[k,v]of Object.entries(attrs))el.setAttribute(k,v);
    if(txt!=null)el.textContent=txt;
    return el;
  }

  function drawChart(){
    const chart=document.getElementById('evo-svg');
    chart.innerHTML='';
    const hasSel=sel.size>0;
    const glVals=evoMode==='pos'?[1,5,10,15,20,25,30,34]:Array.from({length:Math.ceil(maxPts/10)+1},(_,k)=>k*10);
    glVals.forEach(v=>{
      const y=evoMode==='pos'?yR(v):yP(v,maxPts);
      chart.appendChild(svgEl('line',{x1:ML,y1:y,x2:ML+IW,y2:y,stroke:'#EDE8DB','stroke-width':'0.7'}));
      chart.appendChild(svgEl('text',{x:ML-4,y:y+3.5,'text-anchor':'end','font-size':9,fill:'#999'},String(v)));
    });
    DATES.forEach((d,i)=>{
      chart.appendChild(svgEl('text',{x:xi(i),y:MT+IH+13,'text-anchor':'middle','font-size':9,fill:'#999'},d.split(' ')[0]));
    });
    chart.appendChild(svgEl('text',{x:ML+IW/2,y:MT+IH+27,'text-anchor':'middle','font-size':9,fill:'#bbb','letter-spacing':'0.1em'},'JUNIO 2026'));

    PLAYERS.forEach(p=>{
      if(hasSel&&sel.has(p.name))return;
      const op=hasSel?0.07:p.name===YOU?1:0.82;
      const sw=!hasSel&&p.name===YOU?2.2:1.3;
      const path=svgEl('path',{d:mkPath(p),stroke:COLORS[p.name],'stroke-width':sw,fill:'none',style:'cursor:pointer;opacity:'+op});
      path.addEventListener('click',()=>toggle(p.name));
      chart.appendChild(path);
    });

    if(hasSel){
      const labels=[];
      sel.forEach(name=>{
        const p=PLAYERS.find(x=>x.name===name),c=COLORS[name];
        const path=svgEl('path',{d:mkPath(p),stroke:c,'stroke-width':3,fill:'none',style:'cursor:pointer'});
        path.addEventListener('click',()=>toggle(name));
        chart.appendChild(path);
        p.ranks.forEach((_,i)=>{
          const ci=svgEl('circle',{cx:xi(i).toFixed(1),cy:yOf(p,i).toFixed(1),r:3,fill:c,stroke:'#fff','stroke-width':1,style:'cursor:pointer'});
          ci.addEventListener('click',()=>toggle(name));
          chart.appendChild(ci);
        });
        labels.push({name,c,orig:yOf(p,D-1),y:yOf(p,D-1)});
      });
      deCol(labels).forEach(o=>{
        const lbl=dn(o.name),lw=lbl.length*6.4+10;
        if(Math.abs(o.y-o.orig)>1)chart.appendChild(svgEl('line',{x1:ML+IW+2,y1:o.orig,x2:ML+IW+6,y2:o.y,stroke:o.c,'stroke-width':1,opacity:0.6}));
        chart.appendChild(svgEl('rect',{x:ML+IW+6,y:o.y-8,width:lw,height:16,rx:3,fill:'white',stroke:o.c,'stroke-width':1.2}));
        chart.appendChild(svgEl('text',{x:ML+IW+11,y:o.y+1,fill:o.c,'font-size':10,'font-weight':700,'dominant-baseline':'middle'},lbl));
      });
    }
  }

  function toggle(name){sel.has(name)?sel.delete(name):sel.add(name);updateEvoUI();}
  function clearSel(){sel.clear();updateEvoUI();}

  function updateEvoUI(){
    const hasSel=sel.size>0;
    document.getElementById('clr-btn').style.display=hasSel?'inline-block':'none';
    document.getElementById('evo-info').innerHTML=hasSel
      ?'Comparando: '+[...sel].map(n=>`<b style="color:${COLORS[n]}">${dn(n)}</b>`).join(', ')
      :'Toca un jugador para resaltar su trayectoria.';
    document.querySelectorAll('.chip[data-en]').forEach(ch=>{
      const n=ch.dataset.en,c=COLORS[n],isSel=sel.has(n);
      ch.style.boxShadow=isSel?`0 0 0 2px ${c}`:'none';
      ch.style.background=isSel?'#F8F4EC':'#fff';
      ch.style.opacity=hasSel&&!isSel?'0.22':'1';
      ch.style.borderTopColor=isSel?c:'#E0D8C8';
      ch.style.borderRightColor=isSel?c:'#E0D8C8';
      ch.style.borderBottomColor=isSel?c:'#E0D8C8';
    });
    drawChart();
  }

  const sorted=[...PLAYERS].sort((a,b)=>a.ranks[D-1]-b.ranks[D-1]||a.name.localeCompare(b.name));
  let legHTML='';
  sorted.forEach(p=>{
    const c=COLORS[p.name];
    legHTML+=`<div class="chip" data-en="${p.name}" style="border-left:4px solid ${c};border-top:1px solid #E0D8C8;border-right:1px solid #E0D8C8;border-bottom:1px solid #E0D8C8">
      <span class="cn">${dn(p.name)}</span>${p.name===YOU?'<span class="cy">TÚ</span>':''}
      <span class="crk">${p.ranks[D-1]}°</span></div>`;
  });

  document.getElementById('panel-evo').innerHTML=`
    <div class="ectl">
      <div class="seg">
        <button id="bPos" class="on" onclick="eMode('pos')">Posición</button>
        <button id="bPts" onclick="eMode('pts')">Puntos</button>
      </div>
      <button class="clr-btn" id="clr-btn" onclick="eClear()">✕ Limpiar</button>
      <div id="evo-info">Toca un jugador para resaltar su trayectoria.</div>
    </div>
    <div class="chartbox"><svg id="evo-svg" class="echart" viewBox="0 0 ${W} ${H}"></svg></div>
    <div class="sec">Jugadores — posición final</div>
    <div class="leg-grid">${legHTML}</div>`;

  document.querySelectorAll('.chip[data-en]').forEach(ch=>{
    ch.addEventListener('click',()=>toggle(ch.dataset.en));
  });

  window.eMode=m=>{evoMode=m;document.getElementById('bPos').className=m==='pos'?'on':'';document.getElementById('bPts').className=m==='pts'?'on':'';drawChart();};
  window.eClear=clearSel;
  window._evoReady=drawChart;
  drawChart();
}

// ── ESPECIALES ────────────────────────────────────────────────────────
function buildEsp(data){
  let html=`<div class="sec">Pronósticos especiales (1°, 2°, 3°, Goleador, Balón de Oro)</div>
  <div style="overflow-x:auto"><table class="spec-table"><thead><tr>
    <th>Jugador</th><th>🥇 Campeón</th><th>🥈 2°</th><th>🥉 3°</th><th>🥾 Goleador</th><th>⭐ MVP</th>
  </tr></thead><tbody>`;
  data.specials.forEach(s=>{
    const you=s.name===YOU;
    html+=`<tr class="${you?'you-row':''}">
      <td><b>${dn(s.name)}</b>${you?' <span class="you-tag">TÚ</span>':''}</td>
      <td>${flag(s.first)} ${s.first}</td>
      <td>${flag(s.second)} ${s.second}</td>
      <td>${flag(s.third)} ${s.third}</td>
      <td>${s.scorer}</td>
      <td>${s.mvp}</td>
    </tr>`;
  });
  html+=`</tbody></table></div>
  <div class="foot">Polla Mundialera Colomas y Asociados · 34 jugadores · Mundial 2026</div>`;
  document.getElementById('panel-esp').innerHTML=html;
}
</script>
