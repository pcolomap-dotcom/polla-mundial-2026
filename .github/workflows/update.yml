name: Actualizar resultados del Mundial

on:
  schedule:
    # Corre cada 30 min durante el torneo (junio-julio 2026) para reflejar
    # cada partido poco después de que termine. Plan gratuito: 10 req/min.
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # También se puede correr manualmente desde GitHub → Actions → "Run workflow"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar resultados
        run: python update.py

      - name: Commit y push si hay cambios
        run: |
          git config user.name  "Polla Bot 🤖"
          git config user.email "bot@polla-mundial.com"
          git add data.json
          git diff --staged --quiet && echo "Sin cambios nuevos" || \
            (git commit -m "🔄 Resultados actualizados automáticamente" && git push)
